name: Django CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.14'
    
    - name: Install uv
      run: |
        pip install --upgrade uv
    
    - name: Install Dependencies
      run: |
        uv sync --frozen

    - name: Validate seed fixture
      env:
         DB_NAME: github_actions
         DB_USER: postgres
         DB_PASSWORD: postgres
         DB_HOST: localhost
         DB_PORT: 5432
      run: |
        uv run manage.py migrate
        uv run manage.py seed_db
        uv run manage.py seed_db
        
    - name: Run Tests
      env:
         DB_NAME: github_actions
         DB_USER: postgres
         DB_PASSWORD: postgres
         DB_HOST: localhost
         DB_PORT: 5432
      run: |
        uv run python manage.py test
        
    - name: Run linting
      run: |
        uv run black . --check

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Deploy to Digital Ocean
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Cleanup Docker resources
          docker system prune -a -f

          # Cleanup system logs
          sudo journalctl --vacuum-time=3d
          sudo apt clean

          # Update codebase
          cd ./opt/trivia/
          git fetch origin main
          # Capture current HEAD before reset so we can diff what actually changed
          PREVIOUS_HEAD=$(git rev-parse HEAD 2>/dev/null || echo "")
          git reset --hard origin/main

          # Create .env file using GitHub secrets
          echo "DEBUG=False" > .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}" >> .env
          echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}" >> .env
          echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}" >> .env
          echo "EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}" >> .env
          echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}" >> .env
          echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}" >> .env
          echo "DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}" >> .env

          # Remove existing containers and networks (preserve volumes for certs)
          docker-compose down --remove-orphans
          docker-compose up -d --build

          # Apply content fixture to production if content.json changed in this push.
          # PREVIOUS_HEAD was captured before the git reset above so the diff is accurate.
          # On the very first deploy PREVIOUS_HEAD will be empty; fall back to always seeding.
          CONTENT_CHANGED=false
          if [ -z "$PREVIOUS_HEAD" ]; then
            echo "No previous HEAD - treating as first deploy, will seed content."
            CONTENT_CHANGED=true
          elif git diff --name-only "$PREVIOUS_HEAD" HEAD -- quiz/fixtures/content.json | grep -q 'content.json'; then
            echo "content.json changed in this push."
            CONTENT_CHANGED=true
          else
            echo "content.json unchanged - skipping content seed."
          fi

          if [ "$CONTENT_CHANGED" = "true" ]; then
            echo "Waiting for web container to be ready..."
            # Poll until the container can run a management command (up to 90s)
            for i in $(seq 1 18); do
              if docker-compose exec -T web uv run manage.py check 2>/dev/null; then
                break
              fi
              echo "  attempt $i/18, retrying in 5s..."
              sleep 5
            done
            docker-compose exec -T web uv run manage.py seed_db --force
            echo "Content fixture applied."
          fi
